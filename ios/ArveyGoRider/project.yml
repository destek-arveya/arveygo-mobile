name: ArveyGoRider
options:
  bundleIdPrefix: com.arveya
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    DEVELOPMENT_TEAM: DMGAP95S6R
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ArveyGoRider:
    type: application
    platform: iOS
    sources:
      - path: ArveyGoRider
        type: group
    settings:
      base:
        INFOPLIST_FILE: ArveyGoRider/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.arveya.arveygorider
        DEVELOPMENT_TEAM: DMGAP95S6R
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - framework: CoreBluetooth.framework
        embed: false
      - framework: CoreLocation.framework
        embed: false
